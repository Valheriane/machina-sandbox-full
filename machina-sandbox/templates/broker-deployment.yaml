apiVersion: apps/v1
kind: Deployment
metadata:
  name: broker
spec:
  replicas: {{ .Values.broker.replicas }}
  selector:
    matchLabels:
      app: broker
  template:
    metadata:
      labels:
        app: broker
    spec:
      containers:
        - name: broker
          image: "{{ .Values.broker.image.repository }}:{{ .Values.broker.image.tag }}"
          imagePullPolicy: {{ .Values.broker.image.pullPolicy }}
          ports:
            - containerPort: 1883
            - containerPort: 9001