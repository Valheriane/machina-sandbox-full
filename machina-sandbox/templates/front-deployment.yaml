apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
spec:
  replicas: {{ .Values.front.replicas }}
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
        - name: front
          image: "{{ .Values.front.image.repository }}:{{ .Values.front.image.tag }}"
          imagePullPolicy: {{ .Values.front.image.pullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: VITE_MQTT_URL
              value: {{ .Values.front.env.mqttUrl | quote }}
            - name: VITE_API_BASE
              value: {{ .Values.front.env.apiBase | quote }}