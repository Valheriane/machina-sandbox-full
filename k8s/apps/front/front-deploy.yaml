apiVersion: apps/v1
kind: Deployment
metadata:
  name: front
  namespace: machina-sandbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front
  template:
    metadata:
      labels:
        app: front
    spec:
      containers:
        - name: front
          image: front:fix2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: front
  namespace: machina-sandbox
spec:
  selector:
    app: front
  type: NodePort
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30785