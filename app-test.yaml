apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: machina-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Valheriane/machina-sandbox-full.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: machina-sandbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

